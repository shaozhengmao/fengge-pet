<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 220px;
      height: 260px;
      -webkit-app-region: drag;
      user-select: none;
    }

    #bubble {
      position: absolute;
      bottom: 112px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: sans-serif;
      color: #333;
      white-space: normal;
      max-width: 180px;
      word-break: keep-all;
      text-align: center;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      -webkit-app-region: no-drag;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }

    /* 箭头朝下，指向人物 */
    #bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #333;
    }
    #bubble::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: white;
      margin-top: -2px;
      z-index: 1;
    }

    #pet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 104px;
      -webkit-app-region: no-drag;
    }

    /* spritesheet 动画容器：用 background-position 切帧 */
    #sprite {
      width: 96px;
      height: 104px;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      background-image: url('assets/spritesheet.webp');
      /* spritesheet 1536x1872，8列×9行，显示区域 96x104，background-size = 800% 900% */
      background-size: 800% 900%;
      background-repeat: no-repeat;
      background-position: 0% 0%;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div id="bubble"></div>
  <div id="pet">
    <div id="sprite"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
